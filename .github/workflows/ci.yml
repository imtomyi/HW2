name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - master

jobs:
  docker-build-push:
    runs-on: [self-hosted, macOS, ARM64]

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Build and push Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/sentiment-analysis-api:latest

      # 5. Deploy to Local Mac Server
      - name: Deploy to Local Mac Server
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/sentiment-analysis-api:latest
          docker stop sentiment-analysis-api || true
          docker rm sentiment-analysis-api || true
          docker run -d --name sentiment-analysis-api -p 8000:8000 ${{ secrets.DOCKERHUB_USERNAME }}/sentiment-analysis-api:latest
