name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - master

jobs:
  docker-build-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Build and push Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/face-analysis-api:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/face-analysis-api:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/face-analysis-api:buildcache,mode=max

  deploy:
    needs: docker-build-push
    runs-on: self-hosted

    steps:
      - name: Deploy API Container
        run: |
          IMAGE_NAME="${{ secrets.DOCKERHUB_USERNAME }}/face-analysis-api:latest"
          CONTAINER_NAME="face-analysis-api-container"
          
          # 1. Log in to Docker Hub using secure piping
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          
          # 2. Pull the latest image pushed from the previous job
          docker pull $IMAGE_NAME
          
          # 3. Stop and remove the existing container cleanly (don't fail if it doesn't exist yet)
          docker stop $CONTAINER_NAME || true
          docker rm $CONTAINER_NAME || true
          
          # 4. Start the new container in detached mode (-d) and bind port 8000
          docker run -d --name $CONTAINER_NAME -p 8000:8000 $IMAGE_NAME
